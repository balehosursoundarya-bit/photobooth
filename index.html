<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>✨ Emoji Aesthetic Photobooth 🎞️</title>
<style>
body {
    text-align: center;
    font-family: 'Poppins', sans-serif;
    background: linear-gradient(135deg, #ffd6e0, #cde7ff);
}

h1 {
    margin-top: 20px;
}

video, canvas {
    border-radius: 20px;
    border: 6px solid white;
    margin-top: 15px;
}

.frame {
    border: 15px solid;
    border-image: linear-gradient(45deg, #ff9a9e, #fad0c4, #fbc2eb, #a6c1ee) 1;
}

button {
    margin: 10px;
    padding: 10px 20px;
    border-radius: 30px;
    border: none;
    cursor: pointer;
    font-size: 16px;
    background: white;
}

.filters button:hover {
    background: #ffe4f2;
}
</style>
</head>
<body>

<h1>🎀 Aesthetic Emoji Photobooth 🎞️</h1>

<video id="video" width="300" height="300" autoplay></video>
<br>
<button onclick="takePhoto()">📸 Capture</button>

<div class="filters">
    <button onclick="setFilter('none')">✨ Normal</button>
    <button onclick="setFilter('grayscale(100%)')">🖤 Vintage</button>
    <button onclick="setFilter('sepia(80%)')">🤎 Warm</button>
    <button onclick="setFilter('contrast(150%)')">💫 Bright</button>
    <button onclick="setFilter('hue-rotate(90deg)')">🌈 Fun</button>
</div>

<br>
<canvas id="canvas" width="300" height="300" class="frame"></canvas>

<script>
const video = document.getElementById('video');
const canvas = document.getElementById('canvas');
const context = canvas.getContext('2d');

navigator.mediaDevices.getUserMedia({ video: true })
.then(stream => {
    video.srcObject = stream;
});

function takePhoto() {
    context.filter = video.style.filter;
    context.drawImage(video, 0, 0, 300, 300);
}

function setFilter(filter) {
    video.style.filter = filter;
}
</script>

</body>
</html>
